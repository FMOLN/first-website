backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Perfume Inventory"
    folder: "_products"
    create: true
    slug: "{{fields.name | slugify}}"
    format: "json"
    fields:
      - {label: "Product Name", name: "name", widget: "string", required: true}
      - {label: "Price (ETB)", name: "price", widget: "string", required: true, hint: "e.g., ETB 4,500"}
      - {label: "Image File", name: "image", widget: "image", required: true}
      - {label: "Brand", name: "brand", widget: "string"}
      - {label: "Gender", name: "gender", widget: "select", options: ["Men", "Women", "Unisex"]}
      - {label: "Size (ML)", name: "size", widget: "string", default: "100ml"}
      - {label: "Concentration", name: "concentration", widget: "select", options: ["Eau de Toilette", "Eau de Parfum", "Parfum"]}
      - {label: "Description", name: "description", widget: "text"}
